server:
  port: 7788

spring:
  application:
    name: mango-bkl

  # 是否延迟Bean的初始化，spring的配置
  # false: 默认值，表示禁用延迟初始化，即所有单例 Bean 在应用启动时就会被创建和注入。
  # true 表示开启延迟初始化，Bean 只有在第一次被使用时才会创建
  main:
    lazy-initialization: false

  datasource:
    url: jdbc:mysql://127.0.0.1:3307/mg_bkl?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver


  data:
    redis:
      host: localhost
      port: 6380
      password: # 密码，没有则不填
      database: 0     # 使用的数据库索引(0-15)
      timeout: 5000ms # 连接超时时间
      lettuce:
        pool:
          max-active: 100  # 连接池最大连接数（根据并发量调整）
          max-idle: 100    # 连接池中的最大空闲连接
          min-idle: 20     # 连接池中的最小空闲连接（生产环境建议>0）
          max-wait: 3000ms # 连接池最大阻塞等待时间（使用负值表示没有限制）
          time-between-eviction-runs: 120s # 空闲连接检测周期，定期释放无效链接

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mango.bkl.entity, com.mango.common.entity   # 多个包用逗号分隔

  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境需要打印sql日志